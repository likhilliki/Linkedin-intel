kind = "web"
previewPath = "/"
title = "LinkedIn Intelligence Dashboard"
version = "1.0.0"
id = "artifacts/linkedin-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19334

[services.development]
run = "pnpm --filter @workspace/linkedin-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/linkedin-dashboard", "run", "build" ]
publicDir = "artifacts/linkedin-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19334"
BASE_PATH = "/"
